name: Deploy to Cloud Run

on:
  workflow_call:
    inputs:
      service_name:
        description: "Cloud Run service name (defaults to repo name)"
        required: false
        type: string
        default: ""
      region:
        description: "GCP region"
        required: false
        type: string
        default: "europe-west2"
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      port:
        description: "Container port"
        required: false
        type: string
        default: "8080"
      public:
        description: "Disable IAP and make service publicly accessible (for customer-facing apps)"
        required: false
        type: boolean
        default: false
    secrets:
      GCP_SA_KEY:
        required: true
      OPENROUTER_API_KEY:
        required: false

env:
  PROJECT_ID: stealthlabs-dev
  REGISTRY: europe-west2-docker.pkg.dev/stealthlabs-dev/services

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVICE_NAME: ${{ inputs.service_name || github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west2-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -f ${{ inputs.dockerfile }} .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          ENV_VARS=""
          if [ -n "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            ENV_VARS="--set-env-vars=OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}"
          fi
          IAP_FLAG="${{ inputs.public && '--no-iap' || '--iap' }}"
          AUTH_FLAG="${{ inputs.public && '--allow-unauthenticated' || '--no-allow-unauthenticated' }}"
          URL=$(gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ inputs.region }} \
            --port=${{ inputs.port }} \
            --platform=managed \
            $ENV_VARS \
            $IAP_FLAG \
            $AUTH_FLAG \
            --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Grant IAP service agent access
        if: ${{ !inputs.public }}
        run: |
          PROJECT_NUMBER=$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \
            --region=${{ inputs.region }} \
            --project=${{ env.PROJECT_ID }} \
            --member="serviceAccount:service-${PROJECT_NUMBER}@gcp-sa-iap.iam.gserviceaccount.com" \
            --role=roles/run.invoker 2>/dev/null || true

      - name: Job summary
        run: |
          echo "## Deployed to Cloud Run" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Service** | \`${{ env.SERVICE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **URL** | ${{ steps.deploy.outputs.url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Region** | \`${{ inputs.region }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.SERVICE_NAME }}:${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Auth** | ${{ inputs.public && 'Public (no IAP)' || 'IAP protected (team only)' }} |" >> "$GITHUB_STEP_SUMMARY"
