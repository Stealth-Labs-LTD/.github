name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release:
    uses: Stealth-Labs-LTD/.github/.github/workflows/release.yml@main

  deploy:
    needs: [release]
    uses: Stealth-Labs-LTD/.github/.github/workflows/deploy-cloud-run.yml@main
    secrets:
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      # Pass the caller's repo secrets so APP_-prefixed ones get auto-injected as Cloud Run env vars.
      all_secrets: ${{ toJSON(secrets) }}
